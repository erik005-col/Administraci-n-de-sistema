version: '3.8'

# =============================================================
# Práctica 10 - Infraestructura Docker
# Servicios: Web (Nginx), Base de Datos (PostgreSQL), FTP
# Red: infra_red (172.20.0.0/16)
# =============================================================

services:

  # -----------------------------------------------------------
  # BASE DE DATOS - PostgreSQL 15
  # Almacena información de usuarios
  # Volumen persistente: db_data → /opt/practica10/db
  # -----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: base_datos_p10
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB:       base_practica
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - infra_red
    mem_limit: 512m
    cpus: 0.5

  # -----------------------------------------------------------
  # SERVIDOR FTP - alpine-ftp-server
  # Permite carga de instaladores y archivos
  # Volumen compartido con Nginx: web_content → /opt/practica10/ftp
  # -----------------------------------------------------------
  ftp:
    image: delfer/alpine-ftp-server
    container_name: servidor_ftp_p10
    restart: unless-stopped
    environment:
      USERS:   "adminftp|passwordftp"
      ADDRESS: "${HOST_IP:-127.0.0.1}"
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - web_content:/ftp/adminftp
    networks:
      - infra_red
    mem_limit: 256m
    cpus: 0.2

  # -----------------------------------------------------------
  # SERVIDOR WEB - Nginx Alpine (imagen personalizada)
  # Imagen con: usuario no-root + server_tokens off
  # Sirve archivos estáticos y los subidos por FTP
  # -----------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: servidor_web_p10
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - web_content:/usr/share/nginx/html
    networks:
      - infra_red
    depends_on:
      - db
      - ftp
    mem_limit: 512m
    cpus: 0.5

# =============================================================
# VOLÚMENES PERSISTENTES
# =============================================================
volumes:
  db_data:
    driver: local
    driver_opts:
      type:   none
      o:      bind
      device: /opt/practica10/db

  web_content:
    driver: local
    driver_opts:
      type:   none
      o:      bind
      device: /opt/practica10/ftp

# =============================================================
# RED PERSONALIZADA
# =============================================================
networks:
  infra_red:
    external: true
