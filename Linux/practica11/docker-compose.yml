version: '3.8'

# ==============================================================
# Práctica 11 — Infraestructura como Código (IaC)
# Orquestación multicapa con Docker Compose
# ==============================================================

services:

  # ------------------------------------------------------------
  # BALANCEADOR DE CARGA / FRONTEND PÚBLICO
  # Único punto de entrada desde internet
  # ------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: balanceador_p11
    restart: always
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - red_publica
      - red_interna
    depends_on:
      - webapp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ------------------------------------------------------------
  # SERVIDOR DE APLICACIONES INTERNO
  # NO expone puertos al host — solo accesible vía nginx
  # ------------------------------------------------------------
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: app_server_p11
    restart: always
    expose:
      - "8080"
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - red_interna
      - red_datos
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ------------------------------------------------------------
  # BASE DE DATOS — PostgreSQL con persistencia
  # Aislada en red_datos — SIN puertos expuestos al host
  # ------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: base_datos_p11
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - red_datos
    # Sin 'ports:' — invisible desde el exterior
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------
  # PANEL ADMINISTRATIVO — PgAdmin
  # Solo accesible mediante túnel SSH — SIN puertos al host
  # ------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: panel_admin_p11
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - red_datos
    # Sin 'ports:' — acceso SOLO por túnel SSH
    depends_on:
      db:
        condition: service_healthy

# ==============================================================
# VOLÚMENES NOMBRADOS — Persistencia de datos
# ==============================================================
volumes:
  db_data:
    name: p11_db_data
    driver: local
  pgadmin_data:
    name: p11_pgadmin_data
    driver: local

# ==============================================================
# REDES MULTICAPA
# red_publica  → nginx expuesto al exterior
# red_interna  → nginx ↔ webapp (capa de aplicación)
# red_datos    → webapp ↔ db ↔ pgadmin (datos aislados)
# ==============================================================
networks:
  red_publica:
    name: p11_red_publica
    driver: bridge

  red_interna:
    name: p11_red_interna
    driver: bridge
    internal: false

  red_datos:
    name: p11_red_datos
    driver: bridge
    internal: true     # Totalmente aislada — sin salida a internet
