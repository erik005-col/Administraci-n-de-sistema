# ==============================================================
# nginx.conf — Práctica 11
# Balanceador de carga y proxy inverso
# server_tokens off → oculta versión de nginx al exterior
# ==============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Seguridad: ocultar versión del servidor ──────────────
    server_tokens off;

    # ── Cabeceras de seguridad adicionales ───────────────────
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    # Eliminar cabecera que delata el servidor de app interno
    proxy_hide_header X-Powered-By;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: grupo de servidores de aplicación ──────────
    # En un entorno real se añaden múltiples instancias aquí
    upstream app_cluster {
        server webapp:8080;
        # Para añadir más instancias (escalado horizontal):
        # server webapp2:8080;
        # server webapp3:8080;
    }

    # ── Servidor principal ────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Endpoint de salud para el healthcheck del propio nginx
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Archivos estáticos servidos directamente por nginx
        location /static/ {
            root   /usr/share/nginx/html;
            expires 1d;
        }

        # Todo el tráfico dinámico se reenvía al servidor de app
        location / {
            proxy_pass         http://app_cluster;
            proxy_http_version 1.1;

            # Cabeceras para que la app conozca el cliente real
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
